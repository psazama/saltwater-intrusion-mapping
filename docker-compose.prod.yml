services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    volumes:
      - /data/swmaps:/app/data  # mount external data volume
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn swmaps.api:app --host 0.0.0.0 --port 8000 --workers 2
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    volumes:
      - /data/swmaps:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    environment:
      - WORKERS_PER_CORE=2
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - /data/swmaps:/data
    restart: unless-stopped

volumes:
  grafana_data: